name: commute_calendar
description: "근태 관리 달력"

publish_to: 'jyp4188@gmail.com'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.4
  bloc: ^8.1.2
  phosphor_flutter: ^2.1.0
  table_calendar: ^3.1.0
  equatable: ^2.0.5
  get_it: ^7.6.0
  json_annotation: ^4.8.1
  world_holidays: ^2.0.1
  intl: ^0.20.0
  go_router: ^14.0.0
  toastification: ^3.2.0
  shared_preferences: ^2.5.5
  drift: ^2.34.0
  drift_flutter: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  json_serializable: ^6.7.1
  drift_dev: ^2.34.1+1

# Flutter 3.43+ final-class IconData 호환을 위해 patched 로컬 사본 사용
dependency_overrides:
  phosphor_flutter:
    path: packages/phosphor_flutter


flutter:

  uses-material-design: true

  assets:
    - assets/fonts/


  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Light.otf
          weight: 300
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
